version: '3.8'

services:
  inventario-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiventas-inventario-independiente
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=database
      - DB_USER=multiventas_user
      - DB_PASSWORD=multiventas_pass
      - DB_NAME=multiventas_db
    networks:
      - multiventas-network
    restart: unless-stopped

networks:
  multiventas-network:
    external: true
    name: multiventas-network
