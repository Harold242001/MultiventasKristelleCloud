version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiventas-api-gateway-independiente
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VENTAS_SERVICE_URL=http://ventas-service:3000
      - INVENTARIO_SERVICE_URL=http://inventario-service:3000
      - CLIENTES_SERVICE_URL=http://clientes-service:3000
    networks:
      - multiventas-network
    restart: unless-stopped

networks:
  multiventas-network:
    external: true
    name: multiventas-network
