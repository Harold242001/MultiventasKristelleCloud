<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Multiventas Krisstelle — App</title>
    <!-- React via CDN (Simulación de React App) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS (Simulación de estilos modernos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ─────────────────────────────────────────────
        // COMPONENTES REACT
        // ─────────────────────────────────────────────
        const API_URL = 'http://localhost:3000'; // Apuntando al API Gateway

        const App = () => {
            const [vistaActual, setVistaActual] = React.useState('productos');

            return (
                <div className="min-h-screen">
                    <nav className="bg-blue-800 p-4 text-white shadow-lg">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold font-mono">🏪 Multiventas Krisstelle</h1>
                            <div className="space-x-4">
                                <button onClick={() => setVistaActual('productos')} className={`px-3 py-1 rounded ${vistaActual === 'productos' ? 'bg-blue-600' : 'hover:bg-blue-700'}`}>Estantes (Inventario)</button>
                                <button onClick={() => setVistaActual('ventas')} className={`px-3 py-1 rounded ${vistaActual === 'ventas' ? 'bg-blue-600' : 'hover:bg-blue-700'}`}>Caja (Ventas)</button>
                                <button onClick={() => setVistaActual('clientes')} className={`px-3 py-1 rounded ${vistaActual === 'clientes' ? 'bg-blue-600' : 'hover:bg-blue-700'}`}>Directorio (Clientes)</button>
                            </div>
                        </div>
                    </nav>
                    
                    <main className="container mx-auto mt-8 p-4">
                        {vistaActual === 'productos' && <ModuloInventario />}
                        {vistaActual === 'ventas' && <ModuloVentas />}
                        {vistaActual === 'clientes' && <ModuloClientes />}
                    </main>
                </div>
            );
        };

        const ModuloInventario = () => {
            const [productos, setProductos] = React.useState([]);

            React.useEffect(() => {
                fetch(`${API_URL}/inventario/productos`)
                    .then(r => r.json())
                    .then(data => setProductos(data.productos || []))
                    .catch(err => console.error("Error cargando inventario:", err));
            }, []);

            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-xl font-semibold mb-4 text-gray-700">📦 Inventario de Productos</h2>
                    <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-gray-100 border-b border-gray-200">
                                <th className="p-3">Nombre</th>
                                <th className="p-3">Categoría</th>
                                <th className="p-3">Stock</th>
                                <th className="p-3">Precio Unitario</th>
                            </tr>
                        </thead>
                        <tbody>
                            {productos.map(p => (
                                <tr key={p.id} className="border-b border-gray-100 hover:bg-gray-50">
                                    <td className="p-3 font-medium text-gray-800">{p.nombre}</td>
                                    <td className="p-3 text-gray-600">{p.categoria}</td>
                                    <td className="p-3"><span className="bg-green-100 text-green-800 px-2 py-1 rounded-full text-sm">{p.stock}</span></td>
                                    <td className="p-3">S/ {Number(p.precioUnitario).toFixed(2)}</td>
                                </tr>
                            ))}
                            {productos.length === 0 && <tr><td colSpan="4" className="p-4 text-center text-gray-500">No hay productos / Cargando...</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        };

        const ModuloVentas = () => {
            const [ventas, setVentas] = React.useState([]);

            React.useEffect(() => {
                fetch(`${API_URL}/ventas`)
                    .then(r => r.json())
                    .then(data => setVentas(data.ventas || []))
                    .catch(err => console.error("Error cargando ventas:", err));
            }, []);

            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-xl font-semibold mb-4 text-gray-700">🛒 Movimientos de Caja (Dashboard)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {ventas.map(v => (
                            <div key={v.id} className="border border-gray-200 p-4 rounded bg-gray-50 flex justify-between">
                                <div>
                                    <p className="font-bold">{v.cliente}</p>
                                    <p className="text-sm text-gray-500">{new Date(v.fecha).toLocaleString()}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xl font-bold text-blue-600">S/ {Number(v.total).toFixed(2)}</p>
                                    <p className="text-xs text-green-600 uppercase font-semibold">{v.estado}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ModuloClientes = () => {
            const [clientes, setClientes] = React.useState([]);

            React.useEffect(() => {
                fetch(`${API_URL}/clientes`)
                    .then(r => r.json())
                    .then(data => setClientes(data.clientes || []))
                    .catch(err => console.error("Error cargando clientes:", err));
            }, []);

            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-xl font-semibold mb-4 text-gray-700">👥 Directorio de Clientes</h2>
                    <ul className="space-y-3">
                        {clientes.map(c => (
                            <li key={c.id} className="border border-blue-100 p-4 rounded flex justify-between items-center hover:bg-blue-50 transition">
                                <div>
                                    <p className="font-bold text-gray-800">{c.nombre}</p>
                                    <p className="text-sm text-gray-600">DNI: {c.dni || 'N/A'}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-sm text-gray-600 font-medium">✉️ {c.email || 'N/A'}</p>
                                    <p className="text-sm text-gray-600 font-medium">📞 {c.telefono || 'N/A'}</p>
                                </div>
                            </li>
                        ))}
                        {clientes.length === 0 && <p className="text-gray-500">No hay clientes...</p>}
                    </ul>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
