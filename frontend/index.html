<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiventas Krisstelle — ERP Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }
        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }
        .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; }
        input:focus, select:focus { ring: 2px; ring-color: #6366f1; outline: none; border-color: #6366f1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_BASE = 'http://localhost:3000';

        const App = () => {
            const [vista, setVista] = React.useState('ventas');
            const [alerta, setAlerta] = React.useState(null);

            const notify = (msg, status = 'success') => {
                setAlerta({ msg, status });
                setTimeout(() => setAlerta(null), 3000);
            };

            return (
                <div className="pb-10">
                    <nav className="bg-slate-900 border-b-4 border-indigo-600 px-6 py-4 shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <img src="logo.png" alt="Logo" className="h-8 w-auto" />
                                <h1 className="text-white font-black tracking-tight uppercase">Multiventas <span className="text-indigo-400 font-normal">Cloud ERP</span></h1>
                            </div>
                            <div className="flex gap-1 bg-slate-800 p-1 rounded-lg">
                                <button onClick={() => setVista('almacen')} className={`px-4 py-2 text-xs font-bold rounded-lg ${vista === 'almacen' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>📦 Almacén</button>
                                <button onClick={() => setVista('clientes')} className={`px-4 py-2 text-xs font-bold rounded-lg ${vista === 'clientes' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>👥 Clientes</button>
                                <button onClick={() => setVista('ventas')} className={`px-4 py-2 text-xs font-bold rounded-lg ${vista === 'ventas' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🛒 Caja</button>
                            </div>
                        </div>
                    </nav>

                    {alerta && (
                        <div className={`fixed top-20 right-5 px-6 py-3 rounded-xl shadow-2xl z-50 text-white font-bold border-l-4 ${alerta.status === 'success' ? 'bg-green-600 border-green-800' : 'bg-red-600 border-red-800'}`}>
                            {alerta.msg}
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto mt-8 px-6">
                        {vista === 'almacen' && <ModuloProd onNotify={notify} />}
                        {vista === 'clientes' && <ModuloCli onNotify={notify} />}
                        {vista === 'ventas' && <ModuloVen onNotify={notify} />}
                    </main>
                </div>
            );
        };

        // --- MÓDULO ALMACÉN ---
        const ModuloProd = ({ onNotify }) => {
            const [items, setItems] = React.useState([]);
            const [search, setSearch] = React.useState('');
            const [editId, setEditId] = React.useState(null);
            const [f, setF] = React.useState({ n: '', p: '', s: '', c: 'Víveres', u: 'unidad' });

            const reload = () => fetch(`${API_BASE}/inventario/productos`).then(r=>r.json()).then(d=>setItems(d.productos || []));
            React.useEffect(() => { reload(); }, []);

            const save = (e) => {
                e.preventDefault();
                const method = editId ? 'PUT' : 'POST';
                const url = editId ? `${API_BASE}/inventario/productos/${editId}` : `${API_BASE}/inventario/productos`;
                
                fetch(url, {
                    method, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: f.n, precioUnitario: f.p, stock: f.s, categoria: f.c, unidadMedida: f.u })
                }).then(() => {
                    setF({ n:'', p:'', s:'', c:'Víveres', u:'unidad' });
                    setEditId(null);
                    reload();
                    onNotify(editId ? '✅ Producto actualizado' : '✅ Producto creado');
                });
            };

            const startEdit = (p) => {
                setEditId(p.id);
                setF({ n: p.nombre, p: p.precioUnitario, s: p.stock, c: p.categoria, u: p.unidadMedida });
            };

            const del = (id) => { if(confirm('¿Borrar?')) fetch(`${API_BASE}/inventario/productos/${id}`, {method:'DELETE'}).then(()=>{ reload(); onNotify('🗑️ Eliminado', 'error'); }); };

            const filtered = items.filter(i => i.nombre.toLowerCase().includes(search.toLowerCase()) || i.categoria.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border h-fit">
                        <h2 className="font-bold mb-4">{editId ? '✏️ Editar Producto' : '➕ Nuevo Producto'}</h2>
                        <form onSubmit={save} className="space-y-3">
                            <input required value={f.n} onChange={e=>setF({...f, n:e.target.value})} placeholder="Nombre..." className="w-full p-2 border rounded-lg text-sm" />
                            <div className="grid grid-cols-2 gap-2">
                                <input required type="number" step="0.1" value={f.p} onChange={e=>setF({...f, p:e.target.value})} placeholder="Precio S/" className="w-full p-2 border rounded-lg text-sm" />
                                <input required type="number" value={f.s} onChange={e=>setF({...f, s:e.target.value})} placeholder="Stock" className="w-full p-2 border rounded-lg text-sm" />
                            </div>
                            <select value={f.c} onChange={e=>setF({...f, c:e.target.value})} className="w-full p-2 border rounded-lg text-sm">
                                <option>Víveres</option><option>Lácteos</option><option>Limpieza</option><option>Golosinas</option>
                            </select>
                            <div className="flex gap-2">
                                <button type="submit" className={`flex-1 py-2 rounded-lg font-bold text-white ${editId ? 'bg-orange-500' : 'bg-slate-900'}`}>{editId ? 'ACTUALIZAR' : 'GUARDAR'}</button>
                                {editId && <button onClick={()=>{setEditId(null); setF({n:'',p:'',s:'',c:'Víveres',u:'unidad'})}} className="p-2 bg-slate-100 rounded-lg">✕</button>}
                            </div>
                        </form>
                    </div>
                    <div className="lg:col-span-3 space-y-4">
                        <div className="bg-white p-3 rounded-xl shadow-sm border flex items-center gap-3">
                            <span className="text-slate-400 ml-2">🔍</span>
                            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre o categoría..." className="w-full bg-transparent border-none outline-none text-sm" />
                        </div>
                        <div className="bg-white rounded-2xl border overflow-hidden shadow-sm">
                            <table className="w-full text-sm">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 text-left">Producto</th>
                                        <th className="p-4 text-center">Stock</th>
                                        <th className="p-4 text-right">Precio</th>
                                        <th className="p-4 text-center">Gestión</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {filtered.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-50">
                                            <td className="p-4"><p className="font-bold">{p.nombre}</p><span className="text-[10px] text-indigo-500 font-bold uppercase">{p.categoria}</span></td>
                                            <td className="p-4 text-center font-bold">{p.stock}</td>
                                            <td className="p-4 text-right font-black">S/ {p.precioUnitario}</td>
                                            <td className="p-4 text-center space-x-3">
                                                <button onClick={()=>startEdit(p)} className="text-slate-400 hover:text-indigo-600">✏️</button>
                                                <button onClick={()=>del(p.id)} className="text-slate-300 hover:text-red-500">🗑️</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MÓDULO CLIENTES ---
        const ModuloCli = ({ onNotify }) => {
            const [clis, setClis] = React.useState([]);
            const [search, setSearch] = React.useState('');
            const [editId, setEditId] = React.useState(null);
            const [f, setF] = React.useState({ n: '', d: '', t: '', e: '' });

            const reload = () => fetch(`${API_BASE}/clientes`).then(r=>r.json()).then(d=>setClis(d.clientes || []));
            React.useEffect(() => { reload(); }, []);

            const save = (e) => {
                e.preventDefault();
                const m = editId ? 'PUT' : 'POST';
                const u = editId ? `${API_BASE}/clientes/${editId}` : `${API_BASE}/clientes`;
                fetch(u, {
                    method: m, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: f.n, dni: f.d, telefono: f.t, email: f.e })
                }).then(() => { setEditId(null); setF({n:'',d:'',t:'',e:''}); reload(); onNotify(editId ? '✏️ Datos actualizados' : '✅ Cliente afiliado'); });
            };

            const startEdit = (c) => { setEditId(c.id); setF({ n: c.nombre, d: c.dni, t: c.telefono, e: c.email }); };
            const del = (id) => { if(confirm('¿Retirar cliente?')) fetch(`${API_BASE}/clientes/${id}`, {method:'DELETE'}).then(()=> { reload(); onNotify('🗑️ Cliente eliminado', 'error'); }); };

            const filtered = clis.filter(c => c.nombre.toLowerCase().includes(search.toLowerCase()) || c.dni.includes(search));

            return (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border h-fit">
                        <h2 className="font-bold mb-4">{editId ? '✏️ Editar Datos' : '👤 Nuevo Cliente'}</h2>
                        <form onSubmit={save} className="space-y-3">
                            <input required value={f.n} onChange={e=>setF({...f, n:e.target.value})} placeholder="Nombre..." className="w-full p-2 border rounded-lg text-sm" />
                            <input required value={f.d} onChange={e=>setF({...f, d:e.target.value})} placeholder="DNI..." className="w-full p-2 border rounded-lg text-sm" />
                            <input value={f.t} onChange={e=>setF({...f, t:e.target.value})} placeholder="Telf..." className="w-full p-2 border rounded-lg text-sm" />
                            <input value={f.e} onChange={e=>setF({...f, e:e.target.value})} placeholder="Email..." className="w-full p-2 border rounded-lg text-sm" />
                            <div className="flex gap-2">
                                <button type="submit" className={`flex-1 py-2 rounded-lg font-bold text-white ${editId ? 'bg-indigo-500' : 'bg-indigo-600'}`}>{editId ? 'ACTUALIZAR' : 'AFILIAR'}</button>
                                {editId && <button onClick={()=>{setEditId(null); setF({n:'',d:'',t:'',e:''})}} className="p-2 bg-slate-100 rounded-lg">✕</button>}
                            </div>
                        </form>
                    </div>
                    <div className="lg:col-span-3 space-y-4">
                        <div className="bg-white p-3 rounded-xl shadow-sm border flex items-center gap-3">
                            <span className="text-slate-400 ml-2">🔍</span>
                            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtrar por nombre o DNI..." className="w-full bg-transparent border-none outline-none text-sm" />
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filtered.map(c => (
                                <div key={c.id} className="bg-white p-5 rounded-xl border shadow-sm border-l-4 border-indigo-500 flex justify-between items-center group">
                                    <div>
                                        <p className="font-bold text-slate-800">{c.nombre}</p>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">DNI: {c.dni} • TEL: {c.telefono || '-'}</p>
                                    </div>
                                    <div className="flex gap-4 opacity-0 group-hover:opacity-100 transition-all">
                                        <button onClick={()=>startEdit(c)} className="text-slate-400 hover:text-indigo-600">✏️</button>
                                        <button onClick={()=>del(c.id)} className="text-red-300 hover:text-red-500 font-bold">✕</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MÓDULO CAJA ---
        const ModuloVen = ({ onNotify }) => {
            const [ventas, setVentas] = React.useState([]);
            const [clis, setClis] = React.useState([]);
            const [prods, setProds] = React.useState([]);
            const [sel, setSel] = React.useState({ c: '', p: '', q: 1 });

            const reload = () => {
                fetch(`${API_BASE}/ventas`).then(r=>r.json()).then(d=>setVentas(d.ventas || []));
                fetch(`${API_BASE}/clientes`).then(r=>r.json()).then(d=>setClis(d.clientes || []));
                fetch(`${API_BASE}/inventario/productos`).then(r=>r.json()).then(d=>setProds(d.productos || []));
            };
            React.useEffect(() => { reload(); }, []);

            const postVenta = (e) => {
                e.preventDefault();
                fetch(`${API_BASE}/ventas`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cliente_id: sel.c, productos: [{ producto_id: sel.p, cantidad: Number(sel.q) }] })
                }).then(r => r.ok ? (reload(), onNotify('💰 Venta Realizada')) : r.json().then(ej => onNotify(ej.error, 'error')));
            };

            return (
                <div className="space-y-8 animate-in">
                    <div className="bg-slate-900 p-8 rounded-[2rem] text-white shadow-2xl">
                        <h2 className="text-xl font-black mb-6 text-center italic uppercase">Punto de Cobro</h2>
                        <form onSubmit={postVenta} className="flex flex-col md:flex-row gap-6 items-end">
                            <div className="flex-1 w-full text-left">
                                <label className="text-[10px] font-bold text-indigo-400 block mb-1">Cliente</label>
                                <select required value={sel.c} onChange={e=>setSel({...sel, c:e.target.value})} className="w-full p-2 text-slate-900 border-none rounded-md font-bold text-sm">
                                    <option value="">-- Buscar --</option>
                                    {clis.map(c => <option key={c.id} value={c.id}>{c.nombre} ({c.dni})</option>)}
                                </select>
                            </div>
                            <div className="flex-1 w-full text-left">
                                <label className="text-[10px] font-bold text-indigo-400 block mb-1">Producto</label>
                                <select required value={sel.p} onChange={e=>setSel({...sel, p:e.target.value})} className="w-full p-2 text-slate-900 border-none rounded-md font-bold text-sm">
                                    <option value="">-- Buscar --</option>
                                    {prods.map(p => <option key={p.id} value={p.id}>{p.nombre} (Stock: {p.stock})</option>)}
                                </select>
                            </div>
                            <div className="w-full md:w-16 text-left">
                                <label className="text-[10px] font-bold text-indigo-400 block mb-1">Cant.</label>
                                <input required type="number" min="1" value={sel.q} onChange={e=>setSel({...sel, q:e.target.value})} className="w-full p-2 text-slate-900 rounded-md text-center font-black" />
                            </div>
                            <button className="bg-indigo-600 px-10 py-2 rounded-lg font-black hover:bg-white hover:text-indigo-900 transition-all">COBRAR</button>
                        </form>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pb-12">
                        {ventas.map((v, i) => (
                            <div key={v.id} className="bg-white p-5 rounded-2xl border-t-8 border-slate-900 shadow-sm">
                                <p className="text-[8px] font-black text-indigo-500 uppercase">Boleta #{i+1}</p>
                                <h4 className="font-bold text-slate-800 truncate">{v.cliente}</h4>
                                <div className="mt-4 flex justify-between items-end border-t pt-2">
                                    <span className="text-[9px] font-bold text-slate-300 uppercase">{new Date(v.fecha).toLocaleTimeString()}</span>
                                    <span className="text-xl font-black">S/ {v.total}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
